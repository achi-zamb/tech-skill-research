<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#15120d"/>
  <!-- gear teeth -->
  <g fill="#f2a73b">
    <rect x="14" y="2" width="4" height="4" rx="1"/>
    <rect x="14" y="26" width="4" height="4" rx="1"/>
    <rect x="2" y="14" width="4" height="4" rx="1"/>
    <rect x="26" y="14" width="4" height="4" rx="1"/>
    <rect x="5.5" y="5.5" width="3.5" height="3.5" rx="1" transform="rotate(45 7.25 7.25)"/>
    <rect x="23" y="5.5" width="3.5" height="3.5" rx="1" transform="rotate(45 24.75 7.25)"/>
    <rect x="5.5" y="23" width="3.5" height="3.5" rx="1" transform="rotate(45 7.25 24.75)"/>
    <rect x="23" y="23" width="3.5" height="3.5" rx="1" transform="rotate(45 24.75 24.75)"/>
    <!-- gear body -->
    <circle cx="16" cy="16" r="9" fill="#f2a73b"/>
    <!-- inner hole -->
    <circle cx="16" cy="16" r="4.5" fill="#15120d"/>
    <!-- small center dot -->
    <circle cx="16" cy="16" r="1.5" fill="#f2a73b"/>
  </g>
</svg>
